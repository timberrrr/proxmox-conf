- alias: Zoe Bedroom AC - Evening Schedule
  id: zoe_bedroom_ac_evening_schedule
  description: Turn on warm mode at 7pm if house is occupied and bedroom is below
    23C, turn off at 10pm
  mode: single
  triggers:
  - trigger: time
    at: '19:00:00'
    id: "on"
  - trigger: time
    at: '22:00:00'
    id: "off"
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: "on"
      - condition: state
        entity_id: binary_sensor.house_occupied
        state: "on"
      - condition: numeric_state
        entity_id: sensor.zoe_bedroom_indoor
        below: 23
      sequence:
      - action: climate.set_hvac_mode
        target:
          entity_id: climate.zoe_bedroom
        data:
          hvac_mode: heat
      - action: climate.set_temperature
        target:
          entity_id: climate.zoe_bedroom
        data:
          temperature: 22.5
      - action: notify.mobile_app_moto_g54_5g
        data:
          title: Zoe AC
          message: Turned on - heat mode, 22.5°C (evening schedule)
    - conditions:
      - condition: trigger
        id: "off"
      sequence:
      - action: climate.set_hvac_mode
        target:
          entity_id: climate.zoe_bedroom
        data:
          hvac_mode: "off"

- alias: Zoe Bedroom AC - Circadian Low Floor
  id: zoe_bedroom_ac_early_morning_schedule
  description: Turn on a 20C floor at 2am if house is occupied and bedroom is below
    20C, to protect the circadian temperature nadir window, bump to 22C at 6am to
    encourage waking, turn off at 7:30am
  mode: single
  triggers:
  - trigger: time
    at: '02:00:00'
    id: "on"
  - trigger: time
    at: '06:00:00'
    id: "bump"
  - trigger: time
    at: '07:30:00'
    id: "off"
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: "on"
      - condition: state
        entity_id: binary_sensor.house_occupied
        state: "on"
      - condition: numeric_state
        entity_id: sensor.zoe_bedroom_indoor
        below: 20
      sequence:
      - action: climate.set_hvac_mode
        target:
          entity_id: climate.zoe_bedroom
        data:
          hvac_mode: heat
      - action: climate.set_temperature
        target:
          entity_id: climate.zoe_bedroom
        data:
          temperature: 20
    - conditions:
      - condition: trigger
        id: "bump"
      - condition: state
        entity_id: binary_sensor.house_occupied
        state: "on"
      sequence:
      - action: climate.set_hvac_mode
        target:
          entity_id: climate.zoe_bedroom
        data:
          hvac_mode: heat
      - action: climate.set_temperature
        target:
          entity_id: climate.zoe_bedroom
        data:
          temperature: 22
      - action: notify.mobile_app_moto_g54_5g
        data:
          title: Zoe AC
          message: Bumped to 22°C (wake encouragement)
    - conditions:
      - condition: trigger
        id: "off"
      sequence:
      - action: climate.set_hvac_mode
        target:
          entity_id: climate.zoe_bedroom
        data:
          hvac_mode: "off"
      - action: notify.mobile_app_moto_g54_5g
        data:
          title: Zoe AC
          message: Turned off (early morning schedule)

- alias: Climate - All AC Off When Unoccupied
  id: climate_all_ac_off_unoccupied
  description: Turn off all house air conditioners when the house becomes unoccupied
  mode: single
  triggers:
  - trigger: state
    entity_id: binary_sensor.house_occupied
    to: "off"
  actions:
  - action: climate.set_hvac_mode
    target:
      entity_id:
        - climate.loft_aircon
        - climate.zoe_bedroom
    data:
      hvac_mode: "off"

- alias: Zoe AC - Unavailable Alert
  id: zoe_ac_unavailable_alert
  description: Alert if Zoe's AC (WF-RAC dongle) stays unavailable for 15+ minutes,
    since the integration has no remote recovery/reboot capability - needs a manual
    power cycle
  mode: single
  triggers:
  - trigger: state
    entity_id: climate.zoe_bedroom
    to: "unavailable"
    for: "00:15:00"
  conditions:
  - condition: not
    conditions:
      - condition: time
        after: "21:00:00"
        before: "05:00:00"
  actions:
  - action: notify.mobile_app_moto_g54_5g
    data:
      title: Zoe AC Offline
      message: Zoe's AC control has been unreachable for 15+ minutes. This integration
        has no remote fix - the dongle likely needs a manual power cycle.

- alias: Loft AC - Unavailable Alert
  id: loft_ac_unavailable_alert
  description: Alert if Loft AC (WF-RAC dongle) stays unavailable for 15+ minutes,
